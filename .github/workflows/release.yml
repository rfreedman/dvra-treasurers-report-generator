name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write          # Required to create GitHub Releases

# ---------------------------------------------------------------------------
# Build matrix: each platform runs on its native runner.
#
# Node 24 compatibility note:
#   - macos-13 runners are incompatible with Node 24 and have been removed.
#   - macosArm64 (macos-latest) covers Apple Silicon; macosX64 cross-compiles
#     from the same arm64 runner since Kotlin/Native supports it.
# ---------------------------------------------------------------------------
jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linuxX64
            artifact_name: app-linux-x64
            binary_path: build/bin/linuxX64/releaseExecutable

          - os: macos-latest
            target: macosArm64
            artifact_name: app-macos-arm64
            binary_path: build/bin/macosArm64/releaseExecutable

          - os: macos-latest             # Cross-compile x64 from the arm64 runner
            target: macosX64
            artifact_name: app-macos-x64
            binary_path: build/bin/macosX64/releaseExecutable

          - os: windows-latest
            target: mingwX64
            artifact_name: app-windows-x64
            binary_path: build/bin/mingwX64/releaseExecutable

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout source
        uses: actions/checkout@v4         # v4 — runs on Node 24 via runner default

      # -----------------------------------------------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # -----------------------------------------------------------------------
      - name: Cache Gradle & Kotlin/Native toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-konan-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-konan-

      # -----------------------------------------------------------------------
      - name: Make Gradle wrapper executable (Linux / macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      # -----------------------------------------------------------------------
      - name: Build release binary
        run: ./gradlew link${{ matrix.target }}ReleaseExecutable --stacktrace
        shell: bash

      # -----------------------------------------------------------------------
      - name: Package binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd ${{ matrix.binary_path }}
          zip -r ../../../../${{ matrix.artifact_name }}.zip .

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.binary_path }}\*" -DestinationPath "${{ matrix.artifact_name }}.zip"

      # -----------------------------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v6  # v6 — Node 24
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4         # v4 — Node 24
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      - name: Download all build artifacts
        uses: actions/download-artifact@v7  # v7 — Node 24
        with:
          path: artifacts

      # -----------------------------------------------------------------------
      - name: Derive version
        id: version
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y.%m.%d)
          echo "value=${DATE}-${SHA}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -30)
          fi
          {
            echo 'notes<<EOF'
            echo "$LOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      - name: Delete existing 'latest' release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (${{ steps.version.outputs.value }})
          body: |
            Automated build from `main` — commit `${{ github.sha }}`

            ## Changes
            ${{ steps.changelog.outputs.notes }}

            ---
            *Binaries are attached below for each supported platform.*
          draft: false
          prerelease: false
          files: artifacts/**/*.zip
